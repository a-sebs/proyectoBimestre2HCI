<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleccionar Edad - LMS Simulador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="screen-content">
            <div class="topbar">
                <a href="02-bienvenida.html" class="icon-btn" aria-label="Volver">⬅️</a>
                <h2>¿Cuántos años tienes?</h2>
            </div>
            
            <div class="stack">
                <div class="card card-interactive text-center" onclick="selectAge('5-8')">
                    <div class="card-icon">🧸</div>
                    <h3>5 a 8 años</h3>
                </div>

                <div class="card card-interactive text-center" onclick="selectAge('9-12')">
                    <div class="card-icon">🎒</div>
                    <h3>9 a 12 años</h3>
                </div>

                <div class="card card-interactive text-center" onclick="selectAge('13-15')">
                    <div class="card-icon">📱</div>
                    <h3>13 a 15 años</h3>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function selectAge(ageGroup) {
            localStorage.setItem('ageGroup', ageGroup);
            window.location.href = '04-presentacion.html';
        }
    </script>
</body>
</html>
