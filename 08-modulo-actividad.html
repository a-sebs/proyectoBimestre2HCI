<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad - LMS Simulador</title>
    <link rel="stylesheet" href="style.css">
    <script src="content-5-8.js"></script>
    <script src="content-9-12.js"></script>
    <script src="content-13-15.js"></script>
    <script src="engine.js"></script>
</head>
<body>
    <div class="app-container" style="position: relative;">
        <!-- Progreso flotante -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; padding: var(--space-md); z-index: 50;">
            <div class="progress-container">
                <div class="progress-bar-bg" style="background: rgba(255,255,255,0.5);">
                    <div class="progress-bar-fill" style="width: 66%;"></div>
                </div>
            </div>
        </div>

        <!-- Falso LMS interactivo (El Reto) -->
        <div class="fake-lms">
            <div class="fake-header">
                <div style="width: 120px; height: 20px; background: #ddd; border-radius: 4px;"></div>
            </div>
            <div class="fake-sidebar"></div>
            
            <div style="margin-left: 100px; max-width: 300px; margin-top: 50px;">
                <h2 style="margin-bottom: 20px;">Iniciar Sesión</h2>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div>
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Usuario</label>
                        <input type="text" id="a-input" style="width: 100%; padding: 12px; font-size: 18px; border: 2px solid #ccc; border-radius: 4px; outline: none;">
                    </div>
                    
                    <div>
                        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Contraseña</label>
                        <input type="password" style="width: 100%; padding: 12px; font-size: 18px; border: 2px solid #ccc; border-radius: 4px;">
                    </div>
                    
                    <button id="a-btn" style="padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;"></button>
                </div>
                <p id="a-error" class="text-base" style="color: var(--state-error); display: none; font-weight: bold; margin-top: 15px;"></p>
            </div>
        </div>

        <!-- Panel Inferior de Instrucciones -->
        <div style="position: absolute; bottom: 0; left: 0; width: 100%; background: white; padding: var(--space-lg); border-top: 2px solid var(--border-color); border-radius: 0 0 var(--radius-lg) var(--radius-lg); box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 50;">
            <h3 style="color: var(--color-primary); margin-bottom: 8px;" id="a-title"></h3>
            <p id="a-inst" style="margin-bottom: 15px; font-weight: bold; color: var(--text-main);"></p>
            <div class="guide-container" id="engine-avatar" style="margin-top: 0;"></div>
        </div>
    </div>
</body>
</html>
