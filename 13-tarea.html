<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregar Tarea - LMS Simulador</title>
    <link rel="stylesheet" href="style.css">
    <script src="content-5-8.js"></script>
    <script src="content-9-12.js"></script>
    <script src="content-13-15.js"></script>
    <script src="engine.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="screen-content">
            <div class="topbar">
                <a href="12-aulas.html" class="icon-btn" aria-label="Volver">⬅️</a>
                <h2 id="t-course"></h2>
            </div>

            <div class="card mt-md">
                <h3 id="t-title"></h3>
                <p class="text-base text-muted mt-sm" id="t-desc"></p>
            </div>

            <div class="upload-zone mt-md">
                <div style="font-size: 40px;">📁</div>
                <label for="t-file-input" class="btn btn-outline mt-md" style="width: auto; display: inline-flex; cursor: pointer;" id="t-upload-label"></label>
                <input type="file" id="t-file-input">
                <p class="text-small mt-sm" id="t-file-name" style="display:none; font-weight: 700; color: var(--color-primary);"></p>
            </div>

            <div class="guide-container mt-auto" id="engine-avatar"></div>

            <button class="btn btn-primary mt-md" id="t-submit"></button>
        </div>
    </div>
</body>
</html>
