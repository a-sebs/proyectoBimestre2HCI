<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final - LMS Simulador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="screen-content center">
            <div class="illustration" style="background-color: var(--state-success-bg);">
                🏆🎓
            </div>
            
            <h1 class="mt-md" style="color: var(--state-success)">¡Misión Cumplida!</h1>
            
            <div class="card stack mt-lg text-center" style="border-color: var(--state-success)">
                <h3>Certificado de Aprendizaje</h3>
                <p class="text-muted text-small">Has completado el 100% de la simulación.</p>
                
                <div class="row mt-md" style="justify-content: center;">
                    <div class="badge-big" style="width: 60px; height: 60px; font-size: 30px;">🌟</div>
                    <div class="badge-big" style="width: 60px; height: 60px; font-size: 30px;">🚀</div>
                    <div class="badge-big" style="width: 60px; height: 60px; font-size: 30px;">🧠</div>
                </div>
            </div>

            <p class="text-large mt-lg">¡Ya estás listo para usar una plataforma virtual real!</p>

            <a href="index.html" class="btn btn-primary mt-auto w-full">
                Volver a practicar

        </div>
    </div>
